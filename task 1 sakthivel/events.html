<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events | DecodeLabs</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="events">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">DecodeLabs Events</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="section top-controls">
      <div>
        <p class="eyebrow">Event Listing</p>
        <h1>Find the right event for you</h1>
      </div>
      <form id="event-search-form" class="search-form" aria-label="Search events">
        <input id="search-input" type="search" placeholder="Search events, location, or category" />
        <select id="category-filter" aria-label="Filter by category">
          <option value="">All categories</option>
        </select>
      </form>
    </section>

    <section id="events-grid" class="grid grid-2"></section>
    <div id="events-empty" class="empty-state hidden">No events match your search.</div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Event Registration System · DecodeLabs Internship Project</p>
    </div>
  </footer>

  <script src="assets/js/app.js" defer></script>
</body>
</html>
