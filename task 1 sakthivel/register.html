<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register for Event | DecodeLabs</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="register">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">DecodeLabs Events</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <section class="section form-section">
      <div class="form-card">
        <p class="eyebrow">Event Registration</p>
        <h1>Complete your registration</h1>
        <form id="registration-form" novalidate>
          <label for="event-select">Select event</label>
          <select id="event-select" required></select>

          <label for="name-input">Full name</label>
          <input id="name-input" name="name" type="text" placeholder="Your full name" required />

          <label for="email-input">Email address</label>
          <input id="email-input" name="email" type="email" placeholder="you@example.com" required />

          <label for="phone-input">Phone number</label>
          <input id="phone-input" name="phone" type="tel" placeholder="1234567890" required />

          <div id="form-error" class="form-error hidden"></div>

          <button class="button button-primary" type="submit">Submit Registration</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>Event Registration System · DecodeLabs Internship Project</p>
    </div>
  </footer>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
